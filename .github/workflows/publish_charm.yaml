name: Publish to edge

on:
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  publish-to-edge:
    uses: canonical/charm-ci/.github/workflows/publish-artifacts.yml@v0.0.1-alpha.1
    permissions:
      actions: read
      contents: write
    secrets:
      CHARMHUB_TOKEN: ${{ secrets.CHARMHUB_TOKEN }}
    with:
      channel: 4/edge
      integration-workflow-name: integration_test.yaml
