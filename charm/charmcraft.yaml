# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

name: netbox-k8s

type: charm

bases:
  - build-on:
    - name: ubuntu
      channel: "22.04"
    run-on:
    - name: ubuntu
      channel: "22.04"

# (Required)
summary: A very short one-line summary of the Django application.

# (Required)
description: |
  A comprehensive overview of your Django application.

extensions:
  - django-framework

requires:
  postgresql:
    interface: postgresql_client
    limit: 1
  s3:
    interface: s3
    limit: 1
  redis:
    interface: redis
    limit: 1
  saml:
    interface: saml
    limit: 1
    optional: true
  oidc:
    interface: oauth
    optional: True
    limit: 1

config:
  options:
    oidc-redirect-path:
      type: string
      description: The path that the user will be redirected upon completing login.
      default: /oauth/complete/oidc/
    oidc-scopes:
      type: string
      description: List of scopes separated by spaces.
      default: "openid profile email"

